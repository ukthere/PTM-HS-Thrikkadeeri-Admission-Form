<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}

.box{
background:white;
margin:10px auto;
padding:12px;
border-radius:8px;
cursor:pointer;
width:300px;
}

.student{
background:white;
padding:10px;
margin:10px;
border-radius:8px;
text-align:left;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- 🔐 BLOCK DIRECT ACCESS -->
<script id="protect">
const secret = "cmFqZXNoQDEyMw==";

let pass = prompt("Enter Admin Password");

if(btoa(pass) !== secret){
    alert("Access Denied!");
    window.location.href = "index.html";
}
</script>

</head>

<body>

<h2>Admin Panel</h2>

<button onclick="setAdmission(true)">Start Admission</button>
<button onclick="setAdmission(false)">Stop Admission</button>

<br><br>

<input id="search" placeholder="Search student" oninput="searchStudents()">

<div id="counts"></div>

<!-- 8 COURSES -->
<div class="box" onclick="show('English Medium - Malayalam Language')">English Medium - Malayalam</div>
<div class="box" onclick="show('English Medium - Sanskrit Language')">English Medium - Sanskrit</div>
<div class="box" onclick="show('English Medium - Arabic Language')">English Medium - Arabic</div>
<div class="box" onclick="show('English Medium - Urdu Language')">English Medium - Urdu</div>

<div class="box" onclick="show('Malayalam Medium - Malayalam Language')">Malayalam Medium - Malayalam</div>
<div class="box" onclick="show('Malayalam Medium - Sanskrit Language')">Malayalam Medium - Sanskrit</div>
<div class="box" onclick="show('Malayalam Medium - Arabic Language')">Malayalam Medium - Arabic</div>
<div class="box" onclick="show('Malayalam Medium - Urdu Language')">Malayalam Medium - Urdu</div>

<div id="list"></div>

<script>

function setAdmission(s){
localStorage.setItem("admissionOpen", s);
alert(s?"Admission Started":"Admission Stopped");
}

function updateCounts(){
let students = JSON.parse(localStorage.getItem("students"))||[];
let c={};
students.forEach(s=>c[s.course]=(c[s.course]||0)+1);

let out="";
for(let k in c) out+=k+" : "+c[k]+"<br>";
document.getElementById("counts").innerHTML=out;
}
updateCounts();

function searchStudents(){
let q=document.getElementById("search").value.toLowerCase();
let students=JSON.parse(localStorage.getItem("students"))||[];

let html="";
students.filter(s=>s.name.toLowerCase().includes(q)).forEach(s=>{
html+=card(s);
});

document.getElementById("list").innerHTML=html;
}

function show(course){
let students=JSON.parse(localStorage.getItem("students"))||[];
let f=students.filter(s=>s.course===course);

let html=`<h3>${course}</h3>
<button onclick='download(${JSON.stringify(f)})'>Download Excel</button>
<button onclick='del("${course}")'>Delete All</button>`;

f.forEach(s=>html+=card(s));

document.getElementById("list").innerHTML=html;
}

function card(s){
return `<div class="student">
<b>${s.name}</b><br>
Parent: ${s.parent}<br>
Address: ${s.address}<br>
School: ${s.school}<br>
Email: ${s.email}<br>
Phone: ${s.phone}<br>
WhatsApp: ${s.whatsapp}<br>
Activity: ${s.interest1}<br>
Category: ${s.interest2}
</div>`;
}

function download(data){
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Students");
XLSX.writeFile(wb,"students.xlsx");
}

function del(course){
if(!confirm("Delete all?"))return;
let students=JSON.parse(localStorage.getItem("students"))||[];
students=students.filter(s=>s.course!==course);
localStorage.setItem("students",JSON.stringify(students));
updateCounts();
document.getElementById("list").innerHTML="";
}

</script>

</body>
</html>
